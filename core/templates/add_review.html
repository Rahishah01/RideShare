{% extends "base.html" %}
{% block title %}Add Review{% endblock %}

{% block content %}

<div class="auth-wrap">
    <form method="POST" class="form-card" style="max-width:500px;">
        {% csrf_token %}

        <h2>Rate your trip ⭐</h2>
        <p class="auth-note">Share your experience with other riders</p>

        <div class="form-group">
            <label>Rating</label>
            <select name="rating">
                <option value="1">1 - Very Bad</option>
                <option value="2">2 - Bad</option>
                <option value="3">3 - Okay</option>
                <option value="4">4 - Good</option>
                <option value="5">5 - Excellent</option>
            </select>
        </div>

        <div class="form-group">
            <label>Comment</label>
            <textarea name="comment" placeholder="Tell others about your experience..." 
                style="width:100%; padding:12px; border-radius:10px; border:1px solid #ddd;"></textarea>
        </div>

        <div class="actions-row">
            <button type="submit" class="btn btn-success">Submit</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
